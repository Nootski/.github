name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - S1 - Critical (blocks usage)
        - S2 - High (major feature broken)
        - S3 - Medium (workaround exists)
        - S4 - Low (cosmetic or minor)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, version, device, etc.
      placeholder: |
        - OS: macOS 14.5
        - Browser: Chrome 126
        - Version / commit: v1.2.3 / abc123

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs, stack traces, or screenshots.

  - type: checkboxes
    id: terms
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
