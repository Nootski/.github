name: Change Request
description: Request a change to existing functionality, configuration, or infrastructure
title: "[CHANGE] "
labels: ["change-request", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when you want to change something that already exists.
        For brand-new functionality, use Feature Request instead.

  - type: textarea
    id: what
    attributes:
      label: What needs to change?
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current Behavior / State
    validations:
      required: true

  - type: textarea
    id: desired
    attributes:
      label: Desired Behavior / State
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason / Business Value
      description: Why is this change needed?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact & Risk
      description: What could break? Who is affected? Is this a breaking change?

  - type: textarea
    id: rollback
    attributes:
      label: Rollback Plan
      description: How do we revert if something goes wrong?

  - type: checkboxes
    id: considerations
    attributes:
      label: Considerations
      options:
        - label: Requires data migration
        - label: Requires deployment
        - label: Requires documentation update
        - label: Requires user communication
