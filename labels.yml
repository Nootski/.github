# Centralized label definitions for all Nootski repositories.
# Apply to repos via: ./scripts/sync-labels.sh
#
# Categories: type, severity, priority, status, meta
# Color codes use hex without the # prefix.

# ─── Type ──────────────────────────────────────────────────────────────────
- name: bug
  color: "d73a4a"
  description: "Something isn't working"
- name: incident
  color: "b60205"
  description: "Production incident or outage"
- name: change-request
  color: "fbca04"
  description: "Change to existing functionality"
- name: feature
  color: "1d76db"
  description: "New feature or enhancement"
- name: documentation
  color: "0075ca"
  description: "Documentation improvement"
- name: security
  color: "ee0701"
  description: "Security-related issue"
- name: question
  color: "d876e3"
  description: "Question or support request"
- name: tech-debt
  color: "5319e7"
  description: "Refactoring or technical debt"

# ─── Severity (mainly for bugs, incidents, security) ───────────────────────
- name: "severity:S1-critical"
  color: "b60205"
  description: "Critical - full outage or blocks usage"
- name: "severity:S2-high"
  color: "d93f0b"
  description: "High - major functionality broken"
- name: "severity:S3-medium"
  color: "fbca04"
  description: "Medium - workaround available"
- name: "severity:S4-low"
  color: "c5def5"
  description: "Low - cosmetic or minor"

# ─── Priority ─────────────────────────────────────────────────────────────
- name: "priority:high"
  color: "e99695"
  description: "High priority"
- name: "priority:medium"
  color: "fef2c0"
  description: "Medium priority"
- name: "priority:low"
  color: "c2e0c6"
  description: "Low priority"

# ─── Status ───────────────────────────────────────────────────────────────
- name: "status:triage"
  color: "ededed"
  description: "Needs triage / initial review"
- name: "status:in-progress"
  color: "0e8a16"
  description: "Actively being worked on"
- name: "status:blocked"
  color: "e11d21"
  description: "Blocked by something else"
- name: "status:needs-review"
  color: "fbca04"
  description: "Waiting for review"
- name: "status:done"
  color: "0e8a16"
  description: "Work complete"

# ─── Meta ─────────────────────────────────────────────────────────────────
- name: "good-first-issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help-wanted"
  color: "008672"
  description: "Extra attention needed"
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or PR already exists"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
- name: "invalid"
  color: "e4e669"
  description: "This doesn't seem right"
